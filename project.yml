name: Aura
options:
  bundleIdPrefix: com.aura
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    SWIFT_VERSION: "5.0"
targets:
  Aura:
    type: application
    platform: iOS
    sources:
      - path: Aura
    info:
      path: Aura/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Aura
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: Aura shows people and meetups near you.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aura.app
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        GENERATE_INFOPLIST_FILE: "NO"
  AuraUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AuraUITests
    dependencies:
      - target: Aura
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aura.app.uitests
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  Aura:
    build:
      targets:
        Aura: all
        AuraUITests: [test]
    test:
      targets:
        - AuraUITests
